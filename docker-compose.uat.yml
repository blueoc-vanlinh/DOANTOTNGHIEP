version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: uat_db
    restart: always
    environment:
      POSTGRES_DB: inventory_uat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Seta2022!
    ports:
      - "5434:5432"
    volumes:
      - uat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: uat_backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...' &&
        sleep 5 &&
        echo 'Running Alembic migrations...' &&
        alembic upgrade head &&
        echo 'Starting FastAPI with Gunicorn...' &&
        gunicorn --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --access-logfile - --error-logfile - app.main:app
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: uat_frontend
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  uat_postgres_data:
