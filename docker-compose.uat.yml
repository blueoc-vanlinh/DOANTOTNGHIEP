version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: uat_db
    restart: always
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Seta2022!
    ports:
      - "5434:5432"
    volumes:
      - uat_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      container_name: uat_backend
      restart: always
      env_file: ./backend/.env
      ports:
        - "8001:8000"
      depends_on:
        - db
      command: >
        sh -c "
        echo 'Waiting for PostgreSQL...' &&
        sleep 5 &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
        "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      container_name: uat_frontend
      restart: always
      ports:
        - "5174:80"
      depends_on:
        - backend

volumes:
  uat_postgres_data:
