name: CI/CD UAT
on:
    push:
        branches: ["uat"]
    pull_request:
        branches: ["uat"]
jobs:
    backend-ci:
        name: Backend - Lint & Dependencies
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
            - name: Install Backend dependencies
              working-directory: ./backend
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run linting
              working-directory: ./backend
              run: |
                  pip install flake8
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
    frontend-ci:
        name: Frontend - Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: ./frontend
              run: npm ci

            - name: Build frontend
              working-directory: ./frontend
              run: npm run build
    deploy-uat:
        name: Deploy to UAT Server
        runs-on: [self-hosted, uat-runner]
        needs: [backend-ci, frontend-ci]
        if: github.ref == 'refs/heads/uat'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy to UAT Server
              run: |
                  echo "🚀 Starting deployment to UAT server..."

                  cd /home/linh/doan/uat/DOANTOTNGHIEP

                  echo "Pulling latest code from uat branch..."
                  git fetch origin
                  git reset --hard origin/uat
                  git clean -fd

                  echo "Stopping old containers..."
                  docker compose -p uat -f docker-compose.uat.yml down

                  echo "Building and starting new containers..."
                  docker compose -p uat -f docker-compose.uat.yml up -d --build

                  echo "✅ UAT deployment completed successfully at $(date)"
                  echo "Backend: http://your-server-ip:8001/docs"
                  echo "Frontend: http://your-server-ip:5174"
