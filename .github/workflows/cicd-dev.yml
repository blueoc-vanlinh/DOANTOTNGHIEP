name: CI/CD Development

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  backend-ci:
    name: Backend - Lint & Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  frontend-ci:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  deploy-dev:
    name: Deploy to DEV Server
    runs-on: [self-hosted, dev-runner]
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DEV Server
        run: |
          echo "🚀 Starting deployment to DEV server..."

          cd /home/linh/doan/dev/DOANTOTNGHIEP

          echo "Pulling latest code from develop branch..."
          git fetch origin
          git reset --hard origin/develop
          git clean -fd

          echo "Stopping old containers..."
          docker compose -p dev -f docker-compose.dev.yml down

          echo "Building and starting new containers..."
          docker compose -p dev -f docker-compose.dev.yml up -d --build

          echo "✅ DEV deployment completed successfully at $(date)"
          echo "Backend → http://your-dev-server:8000/docs"
          echo "Frontend → http://your-dev-server:5173"
