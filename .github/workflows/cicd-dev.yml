name: CI/CD Development

on:
    push:
        branches: ["dev", "develop"]
    pull_request:
        branches: ["dev", "develop", "main"]

jobs:
    backend-ci:
        name: Backend - Test & Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              working-directory: ./backend
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run linting (flake8)
              working-directory: ./backend
              run: |
                  pip install flake8
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
                  flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

            - name: Run tests (nếu có pytest)
              working-directory: ./backend
              run: |
                  pip install pytest
                  pytest || echo "No tests found or tests failed - continuing"
    frontend-ci:
        name: Frontend - Lint & Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: ./frontend
              run: npm ci

            - name: Run linting
              working-directory: ./frontend
              run: npm run lint || echo "Linting completed with warnings"

            - name: Build frontend
              working-directory: ./frontend
              run: npm run build
    docker-build:
        name: Build Docker Images
        runs-on: ubuntu-latest
        needs: [backend-ci, frontend-ci]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Backend Docker Image
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  file: ./backend/Dockerfile.dev
                  push: false
                  tags: inventory-backend:dev

            - name: Build Frontend Docker Image
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  file: ./frontend/Dockerfile.dev
                  push: false
                  tags: inventory-frontend:dev

            - name: Show success message
              run: echo "✅ Docker images built successfully for Development!"
